name: Reminder Cron

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production reminder cron
        run: |
          response=$(curl --fail-with-body -sS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP_STATUS:%{http_code}" \
            "https://lurea.vercel.app/api/cron/reminders")
          echo "$response"
          echo "$response" | grep -q "HTTP_STATUS:200" || exit 1
